name: CI/CD Workflow

on:
  push:
    branches: [main]
  # pull_request:
  #   branches: [main]

jobs:
  lint:
    name: Run ESLint & Prettier
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run Prettier Check
        run: npm run format:check

  type-check:
    name: TypeScript Type Checking
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Run TypeScript Type Checking
        run: npm run type-check

  deploy:
    name: 🚀 Deploy to EC2
    runs-on: ubuntu-latest
    needs: [lint, type-check]
    if: github.ref == 'refs/heads/main'

    steps:
      - name: 🚀 Deploy to EC2
        uses: appleboy/ssh-action@v1.1.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "🚀 Starting frontend deployment on EC2..."
            
            # Check if directory exists
            if [ ! -d "/home/ubuntu/ss-hr-frontend" ]; then
              echo "📂 Directory not found. Cloning repository..."
              cd /home/ubuntu
              git clone git@github.com:Full-Stack-Solutions-Organization/ss-hr-frontend.git
            else
              echo "📂 Directory found. Pulling latest changes..."
            fi

            cd /home/ubuntu/ss-hr-frontend

            echo "📥 Pulling latest code from main..."
            git fetch origin main
            git reset --hard origin/main

            echo "📦 Installing dependencies..."
            npm ci

            echo "🏗️ Building project..."
            npm run build

            echo "✅ Deployment complete! 🚀"
